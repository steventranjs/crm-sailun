<!DOCTYPE html>
<html lang="vi">
<head>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
        .row { display: flex; gap: 10px; }
        .row > * { flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="form-container">
    <form id="leadForm">
        <div class="row">
            <input type="text" id="title" placeholder="Chức vụ (vd: Giam Doc)">
            <select id="salutationName"><option>Mr.</option><option>Ms.</option><option>Mrs.</option></select>
        </div>
        <input type="text" id="firstName" placeholder="Tên" required>
        <input type="text" id="middleName" placeholder="Tên đệm">
        <input type="text" id="lastName" placeholder="Họ" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="phone" placeholder="Số điện thoại" required>
        <input type="text" id="website" placeholder="Website">
        <div class="row">
            <input type="number" id="oppAmount" placeholder="Số tiền (Amount)">
            <input type="text" id="currency" placeholder="Đơn vị (USD)" value="USD">
        </div>
        <input type="text" id="street" placeholder="Địa chỉ (Đường)">
        <div class="row">
            <input type="text" id="city" placeholder="Thành phố">
            <input type="text" id="state" placeholder="Bang/Tỉnh">
        </div>
        <div class="row">
            <input type="text" id="country" placeholder="Quốc gia">
            <input type="text" id="postalCode" placeholder="Mã bưu điện">
        </div>
        <textarea id="description" placeholder="Mô tả nhu cầu" rows="3"></textarea>
        <button type="submit" id="submitBtn">Gửi thông tin</button>
    </form>
</div>

<div id="statusModal" class="modal"><div class="modal-content"><h3 id="modalTitle"></h3><p id="modalMsg"></p><button onclick="closeModal()">Đóng</button></div></div>

<script>
    const form = document.getElementById('leadForm');
    const modal = document.getElementById('statusModal');
    const btn = document.getElementById('submitBtn');

    function showModal(title, msg) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        modal.style.display = 'flex';
    }
    function closeModal() { modal.style.display = 'none'; }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btn.disabled = true;
        showModal('Đang xử lý', '...');

        const data = {
            title: document.getElementById('title').value,
            salutationName: document.getElementById('salutationName').value,
            firstName: document.getElementById('firstName').value,
            middleName: document.getElementById('middleName').value,
            lastName: document.getElementById('lastName').value,
            status: "New",
            phoneNumber: document.getElementById('phone').value,
            emailAddress: document.getElementById('email').value,
            description: document.getElementById('description').value,
            source: "Web Site",
            opportunityAmount: parseFloat(document.getElementById('oppAmount').value) || 0,
            opportunityAmountCurrency: document.getElementById('currency').value,
            website: document.getElementById('website').value,
            addressStreet: document.getElementById('street').value,
            addressCity: document.getElementById('city').value,
            addressState: document.getElementById('state').value,
            addressCountry: document.getElementById('country').value,
            addressPostalCode: document.getElementById('postalCode').value
        };

        try {
            const response = await fetch('https://api-beta.potensus.io/submit-lead', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showModal('Thành công', 'Thông tin đã được lưu!');
                form.reset();
            } else {
                throw new Error();
            }
        } catch (err) {
            showModal('Lỗi', 'Không thể gửi dữ liệu, vui lòng kiểm tra lại.');
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
